workflows:
  ios-workflow:
    name: iOS Build
    max_build_duration: 60

    environment:
      flutter: stable
      xcode: latest

      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.LumosHealth.Test0

    scripts:
      - name: Set up Flutter
        script: |
          cd app/healthkit
          flutter pub get

      - name: Build iOS
        script: |
          cd app/healthkit
          flutter build ipa --release